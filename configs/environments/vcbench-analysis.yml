name: vcbench-analysis
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      - scanpy>=1.9
      - anndata
      - cell-eval
      - pybiomart
      - scikit-learn
      - pandas
      - numpy
      - scipy
      - torch --index-url https://download.pytorch.org/whl/cpu
      - torch_geometric
      - cell-gears==0.1.1
      - cellxgene-census
      - psutil
      - pytest
      - h5py
